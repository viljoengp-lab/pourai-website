<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar-Back — Staff Training Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#C17F24; --gold-light:#E8A830; --gold-dim:rgba(193,127,36,0.2);
  --dark:#070503; --dark-2:#0f0c09; --dark-3:#161208; --dark-4:#1e1810;
  --cream:#F5ECD7; --muted:#9A8A6A; --faint:#6A5A3A; --dim:#3A2A18;
  --border:rgba(193,127,36,0.22); --border-s:rgba(193,127,36,0.5);
  --green:#4a9b7f; --red:#c05050; --amber:#e87020;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--cream);display:flex;flex-direction:column;align-items:center;padding:20px 16px 60px;}

.app-header{width:100%;max-width:640px;background:var(--gold);border-radius:14px 14px 0 0;padding:16px 22px;display:flex;align-items:center;gap:12px;}
.app-icon{width:38px;height:38px;border-radius:50%;background:#0a0807;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.app-name{font-size:15px;font-weight:500;color:#0a0807;}
.app-sub{font-size:10px;color:rgba(10,8,7,0.6);margin-top:2px;}

.card{width:100%;max-width:640px;background:var(--dark-2);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;padding:24px 22px 32px;}
.gold-rule{width:40px;height:2px;background:var(--gold);margin:0 0 16px;}
.section-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:12px;}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
.cat-btn{
  padding:16px 14px;border:1px solid var(--border);border-radius:10px;
  background:rgba(193,127,36,0.04);cursor:pointer;text-align:left;
  transition:all 0.2s;display:flex;align-items:center;gap:12px;
}
.cat-btn:hover{border-color:var(--gold);background:rgba(193,127,36,0.08);}
.cat-btn.selected{border-color:var(--gold);background:rgba(193,127,36,0.12);}
.cat-icon{font-size:22px;flex-shrink:0;}
.cat-name{font-size:13px;font-weight:500;color:var(--cream);}
.cat-desc{font-size:10px;color:var(--faint);margin-top:2px;}

/* DIFFICULTY */
.diff-row{display:flex;gap:8px;margin-bottom:22px;}
.diff-btn{
  flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--faint);font-size:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.2s;text-align:center;
}
.diff-btn:hover{border-color:var(--gold);color:var(--gold);}
.diff-btn.active{background:rgba(193,127,36,0.1);border-color:var(--gold);color:var(--gold);}

/* START BUTTON */
.btn-start{
  width:100%;padding:14px;background:var(--gold);border:none;border-radius:8px;
  color:#0a0807;font-size:12px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:background 0.2s;position:relative;overflow:hidden;
}
.btn-start:hover{background:var(--gold-light);}
.btn-start:disabled{background:rgba(193,127,36,0.25);color:rgba(193,127,36,0.4);cursor:not-allowed;}
.btn-start::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);animation:shimmer 2.5s ease infinite;}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

/* QUIZ AREA */
.quiz-area{display:none;}
.quiz-area.show{display:block;animation:fadeUp 0.4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* PROGRESS */
.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.q-counter{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);}
.q-score{font-size:11px;color:var(--gold);}
.progress-track{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.5s ease;}

/* QUESTION */
.question-box{
  background:rgba(193,127,36,0.05);border:1px solid var(--border);
  border-radius:10px;padding:20px;margin-bottom:16px;
}
.q-category{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.q-text{font-family:'Playfair Display',serif;font-size:18px;line-height:1.45;color:var(--cream);}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.option-btn{
  width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:8px;
  background:rgba(255,255,255,0.03);color:var(--muted);font-size:13px;
  cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;
  transition:all 0.2s;display:flex;align-items:center;gap:12px;
}
.option-btn:hover:not(:disabled){border-color:rgba(193,127,36,0.5);background:rgba(193,127,36,0.06);color:var(--cream);}
.option-btn.correct{border-color:var(--green)!important;background:rgba(74,155,127,0.12)!important;color:var(--cream)!important;}
.option-btn.wrong{border-color:var(--red)!important;background:rgba(192,80,80,0.1)!important;color:var(--muted)!important;}
.option-btn.selected-wrong{border-color:var(--red)!important;background:rgba(192,80,80,0.15)!important;color:var(--cream)!important;}
.option-letter{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:var(--faint);}
.correct .option-letter{border-color:var(--green);background:rgba(74,155,127,0.2);color:var(--green);}
.wrong .option-letter,.selected-wrong .option-letter{border-color:var(--red);background:rgba(192,80,80,0.2);color:var(--red);}

/* EXPLANATION */
.explanation{
  display:none;padding:14px 16px;border-left:2px solid var(--gold);
  background:rgba(193,127,36,0.05);border-radius:0 8px 8px 0;
  font-size:12.5px;color:var(--faint);line-height:1.7;margin-bottom:16px;
}
.explanation.show{display:block;animation:fadeUp 0.3s ease;}
.explanation b{color:var(--cream);font-weight:500;}

/* NEXT BUTTON */
.btn-next{
  width:100%;padding:12px;background:transparent;border:1px solid var(--gold);
  border-radius:8px;color:var(--gold);font-size:12px;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all 0.2s;display:none;
}
.btn-next.show{display:block;}
.btn-next:hover{background:rgba(193,127,36,0.08);}

/* LOADING */
.loading-box{text-align:center;padding:40px 0;}
.dots{display:flex;gap:7px;justify-content:center;margin-bottom:14px;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gold);animation:dp 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dp{0%,80%,100%{transform:scale(0.5);opacity:0.3}40%{transform:scale(1.2);opacity:1}}
.loading-msg{font-size:13px;color:var(--faint);}

/* RESULTS SCREEN */
.results-screen{display:none;}
.results-screen.show{display:block;animation:fadeUp 0.4s ease;}
.score-circle{
  width:120px;height:120px;border-radius:50%;
  border:3px solid var(--gold);margin:0 auto 20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(193,127,36,0.08);
}
.score-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--gold);line-height:1;}
.score-total{font-size:12px;color:var(--faint);margin-top:2px;}
.results-title{font-family:'Playfair Display',serif;font-size:22px;text-align:center;margin-bottom:8px;}
.results-sub{font-size:13px;color:var(--faint);text-align:center;margin-bottom:24px;line-height:1.6;}

.score-bar-wrap{margin-bottom:20px;}
.score-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;}
.score-bar-track{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:4px;transition:width 1s ease;}

.review-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.review-item{padding:12px 14px;border-radius:8px;border:1px solid;display:flex;align-items:flex-start;gap:10px;}
.review-item.r-correct{border-color:rgba(74,155,127,0.3);background:rgba(74,155,127,0.06);}
.review-item.r-wrong{border-color:rgba(192,80,80,0.3);background:rgba(192,80,80,0.06);}
.review-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.review-q{font-size:12px;color:var(--muted);line-height:1.5;}
.review-q b{color:var(--cream);display:block;margin-bottom:3px;font-weight:500;}

.btn-retry{
  width:100%;padding:13px;background:var(--gold);border:none;border-radius:8px;
  color:#0a0807;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;margin-bottom:10px;
}
.btn-retry:hover{background:var(--gold-light);}
.btn-back{
  width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:8px;
  color:var(--faint);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;
}
.btn-back:hover{border-color:var(--gold);color:var(--gold);}

@media(max-width:480px){.cat-grid{grid-template-columns:1fr;}.diff-row{flex-wrap:wrap;}.diff-btn{flex:none;min-width:calc(50% - 4px);}}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-icon">🎓</div>
  <div>
    <div class="app-name">Bar-Back — Staff Training Quiz</div>
    <div class="app-sub">Test and sharpen your hospitality knowledge · 10 questions per round</div>
  </div>
</div>

<div class="card">

  <!-- SETUP SCREEN -->
  <div id="setupScreen">
    <div class="gold-rule"></div>
    <span class="section-label">Choose a Category</span>
    <div class="cat-grid" id="catGrid">
      <button class="cat-btn" onclick="selectCat(this,'Cocktails and Mixology')" data-cat="Cocktails and Mixology">
        <div class="cat-icon">🍸</div>
        <div><div class="cat-name">Cocktails</div><div class="cat-desc">Recipes, techniques, classics</div></div>
      </button>
      <button class="cat-btn" onclick="selectCat(this,'Whisky and Whiskey')" data-cat="Whisky and Whiskey">
        <div class="cat-icon">🥃</div>
        <div><div class="cat-name">Whisky</div><div class="cat-desc">Scotch, bourbon, Japanese</div></div>
      </button>
      <button class="cat-btn" onclick="selectCat(this,'Wine Knowledge')" data-cat="Wine Knowledge">
        <div class="cat-icon">🍷</div>
        <div><div class="cat-name">Wine</div><div class="cat-desc">Regions, grapes, production</div></div>
      </button>
      <button class="cat-btn" onclick="selectCat(this,'Spirits — Gin, Rum, Tequila, Vodka, Cognac')" data-cat="Spirits — Gin, Rum, Tequila, Vodka, Cognac">
        <div class="cat-icon">🍶</div>
        <div><div class="cat-name">Spirits</div><div class="cat-desc">Gin, rum, tequila, vodka, cognac</div></div>
      </button>
      <button class="cat-btn" onclick="selectCat(this,'Beer and Brewing')" data-cat="Beer and Brewing">
        <div class="cat-icon">🍺</div>
        <div><div class="cat-name">Beer</div><div class="cat-desc">Styles, brewing, history</div></div>
      </button>
      <button class="cat-btn" onclick="selectCat(this,'Dubai Service and UAE Alcohol Laws')" data-cat="Dubai Service and UAE Alcohol Laws">
        <div class="cat-icon">🇦🇪</div>
        <div><div class="cat-name">Dubai Laws</div><div class="cat-desc">UAE laws, responsible service</div></div>
      </button>
      <button class="cat-btn" onclick="selectCat(this,'Food and Drink Pairing')" data-cat="Food and Drink Pairing">
        <div class="cat-icon">🍽️</div>
        <div><div class="cat-name">Food Pairing</div><div class="cat-desc">Wine, cocktail and beer pairing</div></div>
      </button>
      <button class="cat-btn" onclick="selectCat(this,'Coffee, Tea and Non-Alcoholic Beverages')" data-cat="Coffee, Tea and Non-Alcoholic Beverages">
        <div class="cat-icon">☕</div>
        <div><div class="cat-name">Coffee and Tea</div><div class="cat-desc">Espresso, brewing, service</div></div>
      </button>
      <button class="cat-btn" onclick="selectCat(this,'Sake and Japanese Spirits')" data-cat="Sake and Japanese Spirits">
        <div class="cat-icon">🍶</div>
        <div><div class="cat-name">Sake and Japanese</div><div class="cat-desc">Sake, shochu, Japanese whisky</div></div>
      </button>
      <button class="cat-btn" onclick="selectCat(this,'Mixed — All Categories')" data-cat="Mixed — All Categories">
        <div class="cat-icon">🎲</div>
        <div><div class="cat-name">Mixed</div><div class="cat-desc">Random from all topics</div></div>
      </button>
    </div>

    <span class="section-label">Difficulty</span>
    <div class="diff-row">
      <button class="diff-btn active" onclick="setDiff(this,'Beginner')">Beginner</button>
      <button class="diff-btn" onclick="setDiff(this,'Intermediate')">Intermediate</button>
      <button class="diff-btn" onclick="setDiff(this,'Advanced')">Advanced</button>
      <button class="diff-btn" onclick="setDiff(this,'Expert')">Expert</button>
    </div>

    <button class="btn-start" id="startBtn" onclick="startQuiz()" disabled>
      🎓 &nbsp; Start Quiz — 10 Questions
    </button>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="quiz-area" id="quizArea">

    <div id="loadingBox" class="loading-box">
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="loading-msg" id="loadMsg">Generating your questions...</div>
    </div>

    <div id="questionBox" style="display:none">
      <div class="progress-row">
        <span class="q-counter" id="qCounter">Question 1 of 10</span>
        <span class="q-score" id="qScore">Score: 0</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

      <div class="question-box">
        <div class="q-category" id="qCategory"></div>
        <div class="q-text" id="qText"></div>
      </div>

      <div class="options" id="optionsContainer"></div>

      <div class="explanation" id="explanation"></div>

      <button class="btn-next" id="nextBtn" onclick="nextQuestion()">
        Next Question →
      </button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="results-screen" id="resultsScreen">
    <div class="score-circle">
      <div class="score-num" id="finalScore">0</div>
      <div class="score-total" id="finalTotal">/ 10</div>
    </div>
    <div class="results-title" id="resultsTitle"></div>
    <div class="results-sub" id="resultsSub"></div>

    <div class="score-bar-wrap">
      <div class="score-bar-label">
        <span>Your Score</span>
        <span id="scorePct"></span>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill" id="scoreBarFill"></div>
      </div>
    </div>

    <span class="section-label">Question Review</span>
    <div class="review-list" id="reviewList"></div>

    <button class="btn-retry" onclick="retryQuiz()">🔄 &nbsp; Try Again — Same Category</button>
    <button class="btn-back" onclick="backToSetup()">← Choose Different Category</button>
  </div>

</div>

<script>
const SYSTEM = `You are a hospitality training expert generating quiz questions for professional bartenders and sommeliers working in Dubai luxury venues. Generate exactly 10 multiple choice questions about: {CATEGORY} at {DIFFICULTY} difficulty level.

Return ONLY a valid JSON array with exactly 10 objects. Each object must have:
- "question": string (the question text)
- "options": array of exactly 4 strings (answer choices, labelled internally A/B/C/D)
- "correct": number (0-3, index of the correct answer)
- "explanation": string (2-3 sentences explaining the correct answer with interesting context)
- "subcategory": string (specific topic within the category)

Make questions progressively interesting — mix factual, practical and applied knowledge. For Dubai Laws questions always include UAE-specific regulations. For cocktail questions always use ml measurements. Keep explanations educational and memorable. Return ONLY the JSON array, no other text.`;

let selectedCat = '';
let selectedDiff = 'Beginner';
let questions = [];
let currentQ = 0;
let score = 0;
let answers = [];
let loadMsgs = ['Generating your questions...','Consulting the knowledge base...','Crafting your quiz...','Almost ready...'];
let loadIdx = 0;
let loadTimer;

function selectCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = cat;
  document.getElementById('startBtn').disabled = false;
}

function setDiff(btn, diff) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedDiff = diff;
}

async function startQuiz() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('quizArea').classList.add('show');
  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('questionBox').style.display = 'none';
  document.getElementById('resultsScreen').classList.remove('show');

  loadIdx = 0;
  loadTimer = setInterval(() => {
    loadIdx = (loadIdx + 1) % loadMsgs.length;
    document.getElementById('loadMsg').textContent = loadMsgs[loadIdx];
  }, 1800);

  try {
    const prompt = SYSTEM.replace('{CATEGORY}', selectedCat).replace('{DIFFICULTY}', selectedDiff);
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    clearInterval(loadTimer);
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('').trim();
    const clean = text.replace(/```json|```/g,'').trim();
    questions = JSON.parse(clean);
    score = 0; currentQ = 0; answers = [];
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('questionBox').style.display = 'block';
    renderQuestion();
  } catch(e) {
    clearInterval(loadTimer);
    document.getElementById('loadMsg').textContent = 'Connection error — please try again.';
  }
}

function renderQuestion() {
  const q = questions[currentQ];
  const letters = ['A','B','C','D'];

  document.getElementById('qCounter').textContent = `Question ${currentQ+1} of ${questions.length}`;
  document.getElementById('qScore').textContent = `Score: ${score}`;
  document.getElementById('progressFill').style.width = `${(currentQ/questions.length)*100}%`;
  document.getElementById('qCategory').textContent = q.subcategory || selectedCat;
  document.getElementById('qText').textContent = q.question;
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('nextBtn').classList.remove('show');

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i, q.correct, q.explanation);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen, correct, explanation) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = chosen === correct;
  if (isCorrect) score++;

  btns[correct].classList.add('correct');
  if (!isCorrect) btns[chosen].classList.add('selected-wrong');

  answers.push({ question:questions[currentQ].question, chosen, correct, isCorrect, options:questions[currentQ].options });

  const expEl = document.getElementById('explanation');
  expEl.innerHTML = `<b>${isCorrect ? '✓ Correct!' : '✗ Not quite.'}</b> ${explanation}`;
  expEl.classList.add('show');

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = currentQ < questions.length - 1 ? 'Next Question →' : 'See Results →';
  nextBtn.classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) { showResults(); return; }
  renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').classList.remove('show');
  document.getElementById('quizArea').style.display = 'none';

  const pct = Math.round((score / questions.length) * 100);
  const barColor = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--gold)' : pct >= 40 ? 'var(--amber)' : 'var(--red)';
  let title, sub;
  if (pct === 100) { title = 'Perfect Score! 🏆'; sub = 'Outstanding. You have mastered this category. Your knowledge is at sommelier level.'; }
  else if (pct >= 80) { title = 'Excellent! 🌟'; sub = `${score} out of ${questions.length} correct. Strong professional knowledge. Review the questions you missed and you will be at expert level.`; }
  else if (pct >= 60) { title = 'Good Effort 👍'; sub = `${score} out of ${questions.length} correct. Solid foundation. Focus on the missed topics to strengthen your knowledge before service.`; }
  else if (pct >= 40) { title = 'Keep Practising 📚'; sub = `${score} out of ${questions.length} correct. More study needed in this category. Review Bar-Back knowledge and try again.`; }
  else { title = 'More Study Needed 📖'; sub = `${score} out of ${questions.length} correct. This category needs focused attention. Use Bar-Back to study the topics you missed.`; }

  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalTotal').textContent = `/ ${questions.length}`;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsSub').textContent = sub;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreBarFill').style.cssText = `width:${pct}%;background:${barColor}`;

  const reviewEl = document.getElementById('reviewList');
  reviewEl.innerHTML = '';
  answers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = `review-item ${a.isCorrect ? 'r-correct' : 'r-wrong'}`;
    div.innerHTML = `
      <div class="review-icon">${a.isCorrect ? '✓' : '✗'}</div>
      <div class="review-q">
        <b>Q${i+1}: ${a.question}</b>
        ${!a.isCorrect ? `Your answer: ${a.options[a.chosen]}<br>Correct: ${a.options[a.correct]}` : `Correct: ${a.options[a.correct]}`}
      </div>`;
    reviewEl.appendChild(div);
  });

  document.getElementById('resultsScreen').classList.add('show');
}

function retryQuiz() {
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = 'block';
  startQuiz();
}

function backToSetup() {
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('quizArea').classList.remove('show');
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
}
</script>
</body>
</html>
